<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Credit Risk</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --border: #1e2230;
      --accent: #00e5ff; --accent2: #7c3aed; --text: #e8eaf0; --muted: #6b7280;
      --error: #ef4444; --success: #10b981;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px; pointer-events: none; z-index: 0;
    }
    .card {
      position: relative; z-index: 1;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 460px;
      box-shadow: 0 0 60px rgba(0,0,0,0.4);
      animation: slideUp 0.5s ease both;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent2), #4f46e5);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }

    h2 { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 14px 13px 42px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    input.error-field { border-color: var(--error); }

    .field-error { color: var(--error); font-size: 0.78rem; margin-top: 6px; display: none; }
    .field-error.show { display: block; }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
      background: linear-gradient(135deg, var(--accent2), #4f46e5);
      color: #fff; box-shadow: 0 0 30px rgba(124,58,237,0.3);
      transition: all 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 0 40px rgba(124,58,237,0.5); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px; border-radius: 10px; font-size: 0.88rem;
      margin-bottom: 20px; display: none; align-items: flex-start; gap: 10px;
    }
    .alert.show { display: flex; }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }
    .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--error); }

    .footer-link { text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted); }
    .footer-link a { color: var(--accent); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    .note {
      background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.15);
      border-radius: 10px; padding: 12px 14px; font-size: 0.8rem; color: var(--muted); margin-bottom: 24px;
    }
    .note strong { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-text">CreditRisk AI</span>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Login with your Customer ID and password</p>

    <div class="note">
      <strong>Note:</strong> Username is your numeric Customer ID assigned at registration.
    </div>

    <div class="alert alert-error" id="alertError">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertErrorMsg"></span>
    </div>
    <div class="alert alert-success" id="alertSuccess">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="alertSuccessMsg"></span>
    </div>

    <div class="form-group">
      <label>Customer ID</label>
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <input type="text" id="customerId" placeholder="e.g. 100001"/>
      </div>
      <div class="field-error" id="customerIdErr">Customer ID is required</div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Your password"/>
      </div>
      <div class="field-error" id="passwordErr">Password is required</div>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Login</span>
    </button>

    <div class="footer-link">Don't have an account? <a href="reg.html">Register</a></div>
  </div>

  <script>
    const API = "http://localhost:8000";

    function setLoading(loading) {
      document.getElementById('loginBtn').disabled = loading;
      document.getElementById('spinner').style.display = loading ? 'block' : 'none';
      document.getElementById('btnText').textContent = loading ? 'Logging in...' : 'Login';
    }

    function showError(msg) {
      document.getElementById('alertErrorMsg').textContent = msg;
      document.getElementById('alertError').classList.add('show');
      document.getElementById('alertSuccess').classList.remove('show');
    }

    function showSuccess(msg) {
      document.getElementById('alertSuccessMsg').textContent = msg;
      document.getElementById('alertSuccess').classList.add('show');
      document.getElementById('alertError').classList.remove('show');
    }

    async function handleLogin() {
      document.getElementById('alertError').classList.remove('show');
      document.getElementById('alertSuccess').classList.remove('show');

      const customerId = document.getElementById('customerId').value.trim();
      const password   = document.getElementById('password').value;

      let ok = true;
      if (!customerId) {
        document.getElementById('customerId').classList.add('error-field');
        document.getElementById('customerIdErr').classList.add('show');
        ok = false;
      } else {
        document.getElementById('customerId').classList.remove('error-field');
        document.getElementById('customerIdErr').classList.remove('show');
      }
      if (!password) {
        document.getElementById('password').classList.add('error-field');
        document.getElementById('passwordErr').classList.add('show');
        ok = false;
      } else {
        document.getElementById('password').classList.remove('error-field');
        document.getElementById('passwordErr').classList.remove('show');
      }
      if (!ok) return;

      setLoading(true);
      try {
        // FastAPI OAuth2PasswordRequestForm expects form-data
        const formData = new URLSearchParams();
        formData.append('username', customerId);
        formData.append('password', password);

        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data.detail || 'Login failed.';
          showError(msg);
          return;
        }

        // Store tokens in sessionStorage
        sessionStorage.setItem('access_token',  data.access_token);
        sessionStorage.setItem('refresh_token', data.refresh_token);
        sessionStorage.setItem('customer_id',   customerId);

        showSuccess('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = 'loan.html'; }, 1500);

      } catch (err) {
        showError('Network error. Is the backend running on port 8000?');
      } finally {
        setLoading(false);
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
